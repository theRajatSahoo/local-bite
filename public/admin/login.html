<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — LocalBite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-card {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      text-align: center;
    }
    .login-logo {
      font-size: 2rem;
      margin-bottom: 0.4rem;
    }
    h2 {
      font-size: 1.4rem;
      color: #2d2d2d;
      margin-bottom: 0.25rem;
    }
    .login-subtitle {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 1.75rem;
    }
    .form-group { margin-bottom: 1rem; text-align: left; }
    label { font-size: 0.82rem; font-weight: 600; color: #555; display: block; margin-bottom: 0.35rem; }
    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #667eea; }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #f5c6cb;
      color: #c0392b;
      font-size: 0.83rem;
      padding: 0.6rem 0.9rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
      text-align: left;
    }

    .btn-login {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.25rem;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-hint {
      font-size: 0.76rem;
      color: #aaa;
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🍽️</div>
    <h2>LocalBite Admin</h2>
    <p class="login-subtitle">Sign in to manage your restaurant</p>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter username" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="login-btn" onclick="login()">Login →</button>
    <p class="login-hint">Credentials: admin / 1234</p>
  </div>

  <script>
    // If already logged in, go straight to dashboard
    if (localStorage.getItem("token")) {
      window.location.href = "/admin/index.html";
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.style.display = "block";
    }
    function hideError() { document.getElementById("error-msg").style.display = "none"; }

    // Allow Enter key to submit
    document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });

    async function login() {
      hideError();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("login-btn");

      if (!username || !password) { showError("Please enter both username and password."); return; }

      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.token) {
          localStorage.setItem("token", data.token);
          window.location.href = "/admin/index.html";
        } else {
          showError(data.message || "Invalid username or password.");
          btn.disabled = false;
          btn.textContent = "Login →";
        }
      } catch (err) {
        showError("Could not connect to server. Please try again.");
        btn.disabled = false;
        btn.textContent = "Login →";
      }
    }
  </script>
</body>
</html>
