<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart — LocalBite</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .cart-page-table { width: 100%; border-collapse: collapse; }
    .cart-page-table th { text-align: left; font-size: 0.82rem; color: var(--text-muted); font-weight: 600; padding: 0.5rem 0; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.05em; }
    .cart-page-table td { padding: 1rem 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .cart-qty-control { display: flex; align-items: center; gap: 0.5rem; }
    .cart-qty-btn { background: var(--bg-3); border: 1px solid var(--border); color: var(--text); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
    .cart-qty-btn:hover { background: var(--primary); border-color: var(--primary); }
    .summary-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
  </style>
</head>
<body>
  <nav class="navbar" style="position:relative;">
    <div class="container">
      <a class="navbar-brand" href="/">🍽️ Local<span>Bite</span></a>
      <div class="nav-links"><a href="/">Home</a></div>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <button class="cart-btn" onclick="window.location='/cart.html'">
          🛒 Cart <span class="cart-count" id="cart-count">0</span>
        </button>
        <button class="hamburger" id="hamburger" onclick="document.getElementById('hamburger').classList.toggle('open');document.getElementById('mobile-nav').classList.toggle('open');" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav">
      <a href="/">🏠 Home</a>
      <a href="/cart.html">🛒 Cart</a>
    </nav>
  </nav>

  <section class="page-header">
    <div class="container">
      <div class="breadcrumb"><a href="/">Home</a> / Cart</div>
      <h1>Your Cart 🛒</h1>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div id="cart-empty-state" class="empty-state" style="display:none;">
        <div class="empty-icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Browse restaurants and add items to get started.</p>
        <a href="/" class="btn btn-primary" style="margin-top:1.5rem;">Browse Restaurants</a>
      </div>
      <div id="cart-content">
        <div style="display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start;" id="cart-layout">
          <div>
            <table class="cart-page-table" id="cart-table">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Price</th>
                  <th>Quantity</th>
                  <th>Subtotal</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="cart-table-body"></tbody>
            </table>
            <div style="margin-top:1rem;">
              <button onclick="if(confirm('Clear cart?')){Cart.clearCart();window.location.reload();}" class="btn btn-outline btn-sm">🗑️ Clear Cart</button>
            </div>
          </div>
          <div class="summary-box">
            <h3 style="margin-bottom:1rem;">Order Summary</h3>
            <div class="cart-row muted"><span>Subtotal</span><span id="cart-subtotal">₹0</span></div>
            <div class="cart-row muted"><span>Delivery Charge</span><span>₹30</span></div>
            <hr class="cart-divider" />
            <div class="cart-row total"><span>Total</span><span id="cart-total">₹0</span></div>
            <a href="/checkout.html" class="btn btn-primary btn-full" style="margin-top:1.25rem;">Proceed to Checkout →</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer"><div class="container"><p>© 2025 LocalBite</p></div></footer>

  <script src="/js/cart.js"></script>
  <script src="/js/api.js"></script>
  <script>
    function renderCart() {
      const cart = Cart.getCart();
      const total = Cart.getTotal();
      updateCartBadge();
      if (cart.length === 0) {
        document.getElementById('cart-empty-state').style.display = '';
        document.getElementById('cart-content').style.display = 'none';
        return;
      }
      const tbody = document.getElementById('cart-table-body');
      tbody.innerHTML = cart.map(item => `
        <tr>
          <td><strong>${item.name}</strong></td>
          <td>₹${item.price}</td>
          <td>
            <div class="cart-qty-control">
              <button class="cart-qty-btn" onclick="Cart.removeItem('${item.menuItemId}');renderCart()">−</button>
              <span style="font-weight:700;min-width:20px;text-align:center;">${item.qty}</span>
              <button class="cart-qty-btn" onclick="Cart.addItem({menuItemId:'${item.menuItemId}',name:'${item.name.replace(/'/g,"\\'")}',price:${item.price}},'${Cart.getRestaurantId()}');renderCart()">+</button>
            </div>
          </td>
          <td><strong>₹${item.price * item.qty}</strong></td>
          <td><button style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.1rem;" onclick="Cart.removeItem('${item.menuItemId}');if(Cart.getCart().findIndex(i=>i.menuItemId==='${item.menuItemId}')<0)renderCart();else renderCart();">✕</button></td>
        </tr>
      `).join('');
      document.getElementById('cart-subtotal').textContent = '₹' + total;
      document.getElementById('cart-total').textContent = '₹' + (total + 30);
    }
    renderCart();
  </script>
</body>
</html>
